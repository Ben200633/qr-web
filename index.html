<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menü</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #ff6600;
    color: white;
    padding: 15px;
    text-align: center;
}

.lang button {
    margin: 5px;
    padding: 6px 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.main {
    display: flex;
    gap: 10px;
    padding: 10px;
}

.menu {
    flex: 2;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
}

.item {
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
}

.cart {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 12px;
    height: fit-content;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.qty {
    font-weight: bold;
    margin: 0 5px;
}
</style>
</head>

<body>

<header>
    <h1>🍽️ Restaurant Menü</h1>

    <div class="lang">
        <button onclick="setLang('de')">🇩🇪 DE</button>
        <button onclick="setLang('en')">🇬🇧 EN</button>
        <button onclick="setLang('tr')">🇹🇷 TR</button>
    </div>
</header>

<div class="main">

    <div class="menu" id="menu"></div>

    <div class="cart">
        <h3>🛒 Warenkorb</h3>
        <div id="cart"></div>
        <hr>
        <b>💰 Gesamt:</b> <span id="total">0.00</span> €
    </div>

</div>

<script>

let lang = "de";

/* 20 GERICHTE */
const menu = [
{ id:1, name:{de:"🍕 Pizza", en:"🍕 Pizza", tr:"🍕 Pizza"}, price:8.5 },
{ id:2, name:{de:"🍔 Burger", en:"🍔 Burger", tr:"🍔 Burger"}, price:10 },
{ id:3, name:{de:"🍟 Pommes", en:"🍟 Fries", tr:"🍟 Patates"}, price:4 },
{ id:4, name:{de:"🍝 Pasta", en:"🍝 Pasta", tr:"🍝 Makarna"}, price:9.5 },
{ id:5, name:{de:"🥗 Salat", en:"🥗 Salad", tr:"🥗 Salata"}, price:7.5 },
{ id:6, name:{de:"🍗 Wings", en:"🍗 Wings", tr:"🍗 Kanat"}, price:9 },
{ id:7, name:{de:"🌮 Tacos", en:"🌮 Tacos", tr:"🌮 Taco"}, price:8 },
{ id:8, name:{de:"🍣 Sushi", en:"🍣 Sushi", tr:"🍣 Sushi"}, price:12 },
{ id:9, name:{de:"🍩 Donut", en:"🍩 Donut", tr:"🍩 Donut"}, price:3 },
{ id:10, name:{de:"🍰 Kuchen", en:"🍰 Cake", tr:"🍰 Kek"}, price:5.5 },
{ id:11, name:{de:"☕ Kaffee", en:"☕ Coffee", tr:"☕ Kahve"}, price:2.8 },
{ id:12, name:{de:"🥤 Cola", en:"🥤 Soda", tr:"🥤 Kola"}, price:2.5 },
{ id:13, name:{de:"🍹 Saft", en:"🍹 Juice", tr:"🍹 Meyve Suyu"}, price:3.5 },
{ id:14, name:{de:"🥪 Sandwich", en:"🥪 Sandwich", tr:"🥪 Sandviç"}, price:6 },
{ id:15, name:{de:"🍳 Frühstück", en:"🍳 Breakfast", tr:"🍳 Kahvaltı"}, price:7 },
{ id:16, name:{de:"🍤 Garnelen", en:"🍤 Shrimp", tr:"🍤 Karides"}, price:11 },
{ id:17, name:{de:"🥩 Steak", en:"🥩 Steak", tr:"🥩 Biftek"}, price:15 },
{ id:18, name:{de:"🍛 Curry", en:"🍛 Curry", tr:"🍛 Köri"}, price:9 },
{ id:19, name:{de:"🍜 Ramen", en:"🍜 Ramen", tr:"🍜 Ramen"}, price:10 },
{ id:20, name:{de:"🍨 Eis", en:"🍨 Ice Cream", tr:"🍨 Dondurma"}, price:4 }
];

/* 🛒 CART MIT MENGEN */
let cart = {};

function add(id){
    if(!cart[id]){
        cart[id] = { ...menu.find(m => m.id === id), qty: 1 };
    } else {
        cart[id].qty++;
    }
    renderCart();
}

function remove(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty <= 0){
            delete cart[id];
        }
    }
    renderCart();
}

function renderMenu(){
    let div = document.getElementById("menu");
    div.innerHTML = "";

    menu.forEach(m=>{
        div.innerHTML += `
        <div class="item">
            <h3>${m.name[lang]}</h3>
            <p>${m.price.toFixed(2)} €</p>
            <button onclick="add(${m.id})">➕</button>
        </div>`;
    });
}

function renderCart(){
    let div = document.getElementById("cart");
    div.innerHTML = "";

    let total = 0;

    Object.values(cart).forEach(item=>{
        total += item.price * item.qty;

        div.innerHTML += `
        <div>
            ${item.name[lang]} 
            <span class="qty">x${item.qty}</span>
            ${ (item.price * item.qty).toFixed(2) } €
            <br>
            <button onclick="add(${item.id})">➕</button>
            <button onclick="remove(${item.id})">➖</button>
            <hr>
        </div>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

function setLang(l){
    lang = l;
    renderMenu();
    renderCart();
}

renderMenu();
renderCart();

</script>

</body>
</html>
