<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant App + QR</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #ff6600;
    color: white;
    padding: 15px;
    text-align: center;
}

.lang button {
    margin: 5px;
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.main {
    display: flex;
    gap: 10px;
    padding: 10px;
}

.menu {
    flex: 2;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
}

.item {
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
}

.cart {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 12px;
    height: fit-content;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.qty {
    font-weight: bold;
    margin: 0 5px;
}

.qr {
    margin-top: 15px;
    text-align: center;
}

input {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
    <h1>🍽️ Restaurant App</h1>

    <div class="lang">
        <button onclick="setLang('de')">🇩🇪 DE</button>
        <button onclick="setLang('en')">🇬🇧 EN</button>
        <button onclick="setLang('tr')">🇹🇷 TR</button>
    </div>
</header>

<div class="main">

    <div class="menu" id="menu"></div>

    <div class="cart">

        <h3>🛒 Warenkorb</h3>
        <div id="cart"></div>
        <hr>
        <b>💰 Gesamt:</b> <span id="total">0.00</span> €

        <div class="qr">
            <h3>📱 QR Code Generator</h3>
            <input id="url" placeholder="https://deine-seite.de" oninput="makeQR()">
            <br><br>
            <img id="qrimg" width="180">
        </div>

    </div>

</div>

<script>

/* 🌍 Sprache */
let lang = "de";

/* 🍽️ 50 GERICHTE */
const menu = [
{ id:1, name:{de:"🍕 Pizza", en:"Pizza", tr:"Pizza"}, price:8.5 },

{ id:12, name:{de:"🥤 Cola", en:"Cola", tr:"Kola"}, price:2.5 },
{ id:13, name:{de:"🍹 Saft", en:"Juice", tr:"Meyve Suyu"}, price:3.5 },

{ id:20, name:{de:"🍨 Ice Cream", en:"Ice Cream", tr:"Dondurma"}, price:4 },

{ id:21, name:{de:"🥙 Döner", en:"Doner", tr:"Döner"}, price:7 },

{ id:23, name:{de:"🍕 Tuna Pizza", en:"Tuna Pizza", tr:"Ton Balıklı Pizza"}, price:9.5 },

{ id:46, name:{de:"🥤 Energy Drink", en:"Energy Drink", tr:"Enerji"}, price:3.5 },

{ id:49, name:{de:"🍵 Green Tea", en:"Green Tea", tr:"Yeşil Çay"}, price:2.5 },
{ id:50, name:{de:"🫖 Turkish Tea", en:"Turkish Tea", tr:"Türk Çayı"}, price:2 }
];

/* 🛒 CART STACK */
let cart = {};

function add(id){
    if(!cart[id]) cart[id] = {...menu.find(m=>m.id===id), qty:1};
    else cart[id].qty++;
    renderCart();
}

function remove(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty <= 0) delete cart[id];
    }
    renderCart();
}

/* MENU */
function renderMenu(){
    let div = document.getElementById("menu");
    div.innerHTML = "";

    menu.forEach(m=>{
        div.innerHTML += `
        <div class="item">
            <h3>${m.name[lang]}</h3>
            <p>${m.price.toFixed(2)} €</p>
            <button onclick="add(${m.id})">➕</button>
        </div>`;
    });
}

/* CART */
function renderCart(){
    let div = document.getElementById("cart");
    div.innerHTML = "";

    let total = 0;

    Object.values(cart).forEach(item=>{
        total += item.price * item.qty;

        div.innerHTML += `
        <div>
            ${item.name[lang]} x${item.qty}
            <br>
            ${ (item.price * item.qty).toFixed(2) } €
            <br>
            <button onclick="add(${item.id})">➕</button>
            <button onclick="remove(${item.id})">➖</button>
            <hr>
        </div>`;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

/* 🌍 LANG */
function setLang(l){
    lang = l;
    renderMenu();
    renderCart();
}

/* 📱 QR CODE */
function makeQR(){
    let url = document.getElementById("url").value;

    if(!url){
        document.getElementById("qrimg").src = "";
        return;
    }

    document.getElementById("qrimg").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="
    + encodeURIComponent(url);
}

/* INIT */
renderMenu();
renderCart();

</script>

</body>
</html>
