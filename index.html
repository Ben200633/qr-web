<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Menü</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background: #ff6600;
            color: white;
            padding: 20px;
        }
        .menu {
            padding: 20px;
        }
        .item {
            background: white;
            margin: 10px auto;
            padding: 15px;
            border-radius: 10px;
            max-width: 400px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .price {
            color: #ff6600;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>🍽️ Mein Restaurant</h1>
    <p>Digitales Menü</p>
</header>

<div class="menu">
    <div class="item">
        <h2>Pizza Margherita</h2>
        <p>Klassisch mit Tomate & Käse</p>
        <p class="price">8,50 €</p>
    </div>

    <div class="item">
        <h2>Burger</h2>
        <p>Rindfleisch, Salat, Tomate</p>
        <p class="price">10,00 €</p>
    </div>

    <div class="item">
        <h2>Pasta Carbonara</h2>
        <p>Mit Speck und Sahnesauce</p>
        <p class="price">9,50 €</p>
    </div>
</div>

</body>
</html>
